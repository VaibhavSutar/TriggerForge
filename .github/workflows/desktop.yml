name: Build Desktop App

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    
    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Generate Prisma Client
        run: pnpm run generate --filter @triggerforge/server

      - name: Build Backend (Fastify)
        run: pnpm run build --filter @triggerforge/server

      - name: Build Frontend (Next.js Standalone)
        run: |
          pnpm run build --filter @triggerforge/web
          # Next.js standalone requires copying static and public assets
          # This syntax uses bash, so on Windows we need to use bash coreutils
        shell: bash

      - name: Copy Frontend Assets
        run: |
          cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
          cp -r apps/web/public apps/web/.next/standalone/apps/web/public || echo "No public dir"
        shell: bash

      - name: Package Desktop App
        run: pnpm run package --filter @triggerforge/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TriggerForge-Desktop-${{ matrix.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.dmg
            apps/desktop/release/*.AppImage
