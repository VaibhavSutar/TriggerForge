services:
  - type: web
    name: triggerforge-api
    env: node
    plan: free
    buildCommand: pnpm install && cd apps/server && pnpm run generate && cd ../.. && npx turbo run build --filter=@triggerforge/server
    startCommand: cd apps/server && pnpm run start
    envVars:
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
